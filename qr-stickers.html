<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PRMSU Freedom Wall · QR sticker sheet (A4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @page{size:A4;margin:0}
  body{font-family:'Inter',sans-serif;background:#fff}
  .sheet{width:210mm;height:297mm;padding:8mm;display:grid;
    grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);
    border-top:1px dashed #C4CBD8;border-left:1px dashed #C4CBD8}
  .cell{border-right:1px dashed #C4CBD8;border-bottom:1px dashed #C4CBD8;padding:6mm;overflow:hidden}
  .sticker{display:flex;flex-direction:column;height:100%;color:#12224a}
  .s-brand{display:flex;align-items:center;gap:6px}
  .s-brand img{width:15px;height:15px}
  .s-brand b{font-size:8px;font-weight:800;letter-spacing:.14em;color:#12224a}
  .s-head{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;line-height:1.02;
    margin-top:5px;letter-spacing:-.01em}
  .s-head em{font-style:normal;color:#E0A008}
  .s-row{display:flex;align-items:center;gap:10px;margin-top:auto}
  .s-qr{width:33mm;height:33mm;flex:0 0 auto;position:relative}
  .s-qr svg{width:100%;height:100%;display:block}
  .s-seal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;
    border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px #fff}
  .s-seal img{width:16px;height:16px}
  .s-cta{font-weight:700;font-size:11.5px;line-height:1.25}
  .s-url{display:block;text-align:center;margin-top:7px;font-size:9px;font-weight:700;color:#fff;
    background:#13337C;padding:6px 8px;border-radius:999px}
</style>
</head>

  <div class="sheet" id="sheet"></div>
