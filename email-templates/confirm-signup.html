<!--
  Branded "Confirm signup" email for PRMSU Freedom Wall.
  Paste the HTML below into: Supabase Dashboard -> Authentication -> Emails ->
  "Confirm signup" template (replace the default body). Keep {{ .ConfirmationURL }}.
  You can do the same for the "Invite user", "Magic Link", and "Reset password"
  templates by swapping the heading/text and the {{ . }} variable each one uses.
-->
<div style="background:#f4f6fb;padding:28px 0;font-family:'Segoe UI',Arial,sans-serif;">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e6eaf2;">
    <div style="background:linear-gradient(135deg,#4b7bea,#103A8A);padding:24px;text-align:center;">
      <img src="https://prmsu-freedom-wall.netlify.app/seal.png" width="52" height="52" alt="PRMSU" style="border-radius:50%;background:#fff;padding:4px;">
      <div style="color:#fff;font-size:18px;font-weight:800;margin-top:10px;">PRMSU Freedom Wall</div>
    </div>
    <div style="padding:28px 26px;color:#1b2540;">
      <h1 style="font-size:20px;margin:0 0 12px;">Confirm your email</h1>
      <p style="font-size:15px;line-height:1.6;color:#3c485f;margin:0 0 18px;">
        You're almost in. Tap the button below to confirm your email and finish setting up your moderator account.
      </p>
      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#3B6FE3;color:#fff;text-decoration:none;font-weight:700;padding:12px 22px;border-radius:999px;font-size:15px;">Confirm my email</a>
      <p style="font-size:12.5px;color:#8a93a6;line-height:1.6;margin:22px 0 0;">
        If you did not request this, you can safely ignore this email.
      </p>
    </div>
    <div style="padding:14px;text-align:center;font-size:11.5px;color:#9aa3b6;border-top:1px solid #eef1f7;">
      Unofficial student-made platform. Not affiliated with PRMSU.
    </div>
  </div>
</div>
