# The PRMSU Freedom Wall is a static, multi-page site (index / admin / privacy /
# terms). Everything lives in this folder, so publish the folder as-is.
[build]
  publish = "."
  command = ""

# Send unknown paths to the wall's home page instead of a bare 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Security headers. The anon Supabase key is public by design (protected by RLS),
# so these headers are about the usual browser hardening, not hiding keys.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
